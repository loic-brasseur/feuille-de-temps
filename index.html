  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Manrope', system-ui, sans-serif;
      color: #1A1612;
      background: #FBF5EC;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -webkit-overflow-scrolling: touch;
    }
    body {
      background: radial-gradient(ellipse at top, #FBF5EC 0%, #F4ECDC 100%);
      padding:
        max(1rem, env(safe-area-inset-top))
        max(0.75rem, env(safe-area-inset-right))
        max(2rem, env(safe-area-inset-bottom))
        max(0.75rem, env(safe-area-inset-left));
    }
    .container { max-width: 780px; margin: 0 auto; }
    header { margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(224, 212, 190, 0.6); }
    .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; }
    h1 { font-family: 'Fraunces', Georgia, serif; font-size: clamp(2rem, 7vw, 2.75rem); font-weight: 500; letter-spacing: -0.025em; line-height: 1; margin: 0; }
    .subtitle { font-family: 'Fraunces', serif; font-style: italic; font-size: 0.9375rem; color: #7A6F5C; margin-top: 0.375rem; }
    .input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      padding: 0.625rem 0.75rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #E0D4BE;
      border-radius: 8px;
      color: #1A1612;
      width: 100%;
      transition: all 0.15s ease;
      -webkit-appearance: none;
      appearance: none;
      min-height: 42px;
    }
    .input:focus {
      outline: none; border-color: #B8842F;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 0 3px rgba(184, 132, 47, 0.12);
    }
    .btn {
      font-family: 'Manrope', sans-serif;
      font-size: 0.875rem; font-weight: 500;
      padding: 0.625rem 1.125rem;
      border-radius: 999px; border: none;
      cursor: pointer; transition: all 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      min-height: 44px; touch-action: manipulation;
    }
    .btn-primary { background: #1A1612; color: #FBF5EC; }
    .btn-primary:active { background: #2D2620; transform: scale(0.97); }
    .btn-secondary { background: rgba(184, 132, 47, 0.15); color: #8A6320; }
    .btn-secondary:active { background: rgba(184, 132, 47, 0.25); transform: scale(0.97); }
    .btn-ghost { background: transparent; color: #7A6F5C; padding: 0.5rem; min-height: 40px; min-width: 40px; }
    .btn-ghost:active { background: rgba(0, 0, 0, 0.05); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .card {
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(224, 212, 190, 0.6);
      border-radius: 14px; padding: 1rem;
      transition: all 0.2s ease; backdrop-filter: blur(4px);
    }
    .card-today {
      background: linear-gradient(135deg, #FFF8E8 0%, #FFEFCC 100%);
      border-color: #C9962B;
      box-shadow: 0 4px 16px rgba(201, 150, 43, 0.15);
    }
    .card-weekend { background: rgba(244, 236, 220, 0.5); border-color: rgba(224, 212, 190, 0.4); }
    .card-ferie {
      background: linear-gradient(135deg, #FBE8E8 0%, #F5D7D2 100%);
      border-color: #C56B5A;
    }
    .pill {
      font-family: 'Manrope', sans-serif;
      font-size: 0.75rem; font-weight: 500;
      padding: 0.5rem 0.875rem;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer; transition: all 0.15s ease;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.7);
      color: #7A6F5C;
      min-height: 32px; touch-action: manipulation;
    }
    .pill:active { transform: scale(0.95); }
    .pill-active {
      background: var(--pill-bg, #FFF);
      color: var(--pill-color, #1A1612);
      border-color: var(--pill-color, #1A1612);
    }
    .pills-row {
      display: flex; gap: 0.375rem;
      overflow-x: auto;
      padding: 0 0 0.375rem;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .pills-row::-webkit-scrollbar { display: none; }
    .ferie-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.6875rem; font-weight: 600;
      padding: 0.25rem 0.625rem;
      border-radius: 999px;
      background: rgba(197, 107, 90, 0.15);
      color: #9A4F3E;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .week-label-week { font-family: 'Fraunces', serif; font-size: 0.75rem; color: #7A6F5C; text-transform: uppercase; letter-spacing: 0.15em; margin: 0; font-weight: 500; }
    .week-label-dates { font-family: 'Fraunces', serif; font-size: 1.25rem; font-weight: 500; margin: 0.125rem 0 0; }
    .summary {
      margin-bottom: 1.25rem; padding: 1.25rem;
      border-radius: 16px;
      background: linear-gradient(135deg, #1A1612 0%, #2D2620 100%);
      color: #FBF5EC;
      box-shadow: 0 10px 30px rgba(26, 22, 18, 0.15);
    }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; text-align: center; }
    .summary-label { font-size: 0.625rem; color: #A89F90; text-transform: uppercase; letter-spacing: 0.15em; margin: 0; font-weight: 500; }
    .summary-value { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 600; margin: 0.375rem 0 0; letter-spacing: -0.01em; }
    .summary-value-highlight { color: #E8B547; }
    .summary-value-warning { color: #E89547; }
    .summary-section { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(251, 245, 236, 0.15); }
    .summary-cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; text-align: center; }
    .summary-cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; text-align: center; }
    .summary-sublabel { font-size: 0.5625rem; color: #A89F90; text-transform: uppercase; letter-spacing: 0.12em; margin: 0; font-weight: 500; }
    .summary-subvalue { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 600; margin: 0.25rem 0 0; letter-spacing: -0.01em; color: #FBF5EC; }
    .summary-subnote { font-family: 'Fraunces', serif; font-style: italic; font-size: 0.625rem; color: #A89F90; margin: 0.25rem 0 0; line-height: 1.2; }
    .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
    .day-name { font-family: 'Fraunces', serif; font-size: 1.1875rem; font-weight: 600; margin: 0; display: inline; }
    .day-name-muted { color: #7A6F5C; }
    .day-date { font-family: 'Fraunces', serif; font-style: italic; font-size: 0.8125rem; color: #7A6F5C; margin-left: 0.375rem; }
    .day-total { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 600; }
    .day-total-empty { color: #A89F8A; }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
    .input-label { display: block; font-size: 0.625rem; color: #7A6F5C; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
    .time-pick { display: flex; align-items: center; gap: 0.25rem; }
    .time-select { flex: 1; min-width: 0; padding: 0.625rem 0.375rem; text-align: center; text-align-last: center; font-family: 'JetBrains Mono', monospace; }
    .time-sep { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #7A6F5C; }
    .activity-badge {
      padding: 0.625rem 0.875rem;
      border-radius: 10px;
      font-size: 0.875rem; font-weight: 500;
      text-align: center;
    }
    .entry-block {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(224, 212, 190, 0.5);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      position: relative;
    }
    .entry-block:last-of-type { margin-bottom: 0.5rem; }
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .entry-label {
      font-family: 'Fraunces', serif; font-style: italic;
      font-size: 0.75rem; color: #7A6F5C;
    }
    .entry-minutes {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem; font-weight: 600;
    }
    .add-entry-btn {
      width: 100%;
      padding: 0.625rem;
      border-radius: 10px;
      border: 1px dashed rgba(184, 132, 47, 0.4);
      background: rgba(184, 132, 47, 0.05);
      color: #8A6320;
      font-family: 'Manrope', sans-serif;
      font-size: 0.8125rem; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.375rem;
      min-height: 38px; touch-action: manipulation;
      transition: all 0.15s ease;
    }
    .add-entry-btn:active {
      background: rgba(184, 132, 47, 0.12);
      transform: scale(0.98);
    }
    .auto-entry {
      padding: 0.625rem 0.875rem;
      border-radius: 10px;
      background: rgba(232, 149, 71, 0.12);
      border: 1px solid rgba(232, 149, 71, 0.3);
      color: #8A4F1F;
      font-size: 0.8125rem; font-weight: 500;
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.5rem;
    }
    .auto-entry-ferie {
      background: rgba(91, 123, 91, 0.12);
      border-color: rgba(91, 123, 91, 0.3);
      color: #3D5A3D;
    }
    .auto-entry-value {
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
    }
    .days-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .footer {
      margin-top: 2rem; padding-top: 1.25rem;
      text-align: center;
      border-top: 1px solid rgba(224, 212, 190, 0.6);
      font-family: 'Fraunces', serif; font-style: italic;
      font-size: 0.8125rem; color: #7A6F5C;
    }
    .footer small { font-size: 0.6875rem; opacity: 0.8; }
    .panel { margin-bottom: 1.25rem; padding: 1rem 1.125rem; }
    .panel h3 { font-family: 'Fraunces', serif; font-size: 1.125rem; font-weight: 600; margin: 0 0 0.875rem; }
    .panel-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .panel-label { display: block; font-size: 0.75rem; color: #7A6F5C; margin-bottom: 0.25rem; }
    .icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .icon-sm { width: 14px; height: 14px; }
    .actions-row { margin-top: 1.5rem; display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
    .templates-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .template-btn-content { display: flex; flex-direction: column; line-height: 1.3; }
    .template-btn-content small { font-size: 0.75rem; opacity: 0.7; font-weight: 400; }
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(26, 22, 18, 0.55);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: #FBF5EC;
      width: 100%; max-width: 480px; max-height: 90vh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.25rem max(1.5rem, env(safe-area-inset-bottom));
      animation: slideUp 0.25s ease;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.15);
    }
    @media (min-width: 640px) {
      .modal-backdrop { align-items: center; }
      .modal { border-radius: 20px; max-height: 80vh; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h2 { font-family: 'Fraunces', serif; font-size: 1.625rem; font-weight: 600; margin: 0 0 0.25rem; }
    .modal-subtitle { font-family: 'Fraunces', serif; font-style: italic; font-size: 0.875rem; color: #7A6F5C; margin: 0 0 1.25rem; }
    .period-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1.25rem; }
    .period-option {
      padding: 0.875rem 0.5rem;
      border: 1px solid #E0D4BE;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 12px;
      font-family: 'Manrope', sans-serif;
      font-size: 0.8125rem; font-weight: 500;
      color: #1A1612;
      cursor: pointer; transition: all 0.15s ease;
      text-align: center; min-height: 56px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.125rem;
    }
    .period-option:active { transform: scale(0.97); }
    .period-option-active { background: #1A1612; color: #FBF5EC; border-color: #1A1612; }
    .period-option small { font-size: 0.6875rem; opacity: 0.7; }
    .period-option-active small { opacity: 0.85; }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
    .modal-actions .btn { flex: 1; }
    .preview-info {
      padding: 0.875rem 1rem;
      background: rgba(184, 132, 47, 0.08);
      border-radius: 10px;
      font-size: 0.8125rem; color: #7A6F5C;
      margin-bottom: 0.5rem;
    }
    .preview-info strong { color: #1A1612; font-weight: 600; }
    @media (max-width: 420px) {
      .summary-value { font-size: 1.0625rem; }
      .summary-label { font-size: 0.5625rem; }
      h1 { font-size: 1.875rem; }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>
  <div id="modal-root"></div>

  <script>
    'use strict';

    const DAYS = [
      { key: 'lundi', label: 'Lundi' },
      { key: 'mardi', label: 'Mardi' },
      { key: 'mercredi', label: 'Mercredi' },
      { key: 'jeudi', label: 'Jeudi' },
      { key: 'vendredi', label: 'Vendredi' },
      { key: 'samedi', label: 'Samedi' },
      { key: 'dimanche', label: 'Dimanche' }
    ];

    const ACTIVITIES = {
      au_travail:    { label: 'Au travail',       short: 'Travail',     color: '#1A1612', bg: '#FFFFFF', isWork: true  },
      teletravail:   { label: 'Télétravail',      short: 'Télétravail', color: '#3D5A6C', bg: '#E8F0F4', isWork: true  },
      conges:        { label: 'Congés payés',     short: 'Congés',      color: '#5B7B5B', bg: '#EAF1E5', isWork: false },
      maladie:       { label: 'Maladie',          short: 'Maladie',     color: '#8B5A5A', bg: '#F4E8E8', isWork: false },
      arret:         { label: 'Arrêt de travail', short: 'Arrêt',       color: '#8B5A5A', bg: '#F4E8E8', isWork: false },
      recuperation:  { label: 'Récupération',     short: 'Récup',       color: '#6B5B7B', bg: '#EDE8F0', isWork: false }
    };

    // --- Date helpers ---
    function getEasterDate(year) {
      const a = year % 19, b = Math.floor(year / 100), c = year % 100;
      const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4), k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31);
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month - 1, day);
    }
    function dateKey(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function getFrenchHolidays(year) {
      const easter = getEasterDate(year);
      const easterMonday = new Date(easter); easterMonday.setDate(easter.getDate() + 1);
      const ascension = new Date(easter); ascension.setDate(easter.getDate() + 39);
      // Note: Lundi de Pentecôte (Easter + 50) is intentionally excluded.
      // It's the "Journée de Solidarité" → treated as a regular working day
      // with no overtime, no bonus, no auto-credit.
      return {
        [year + '-01-01']: "Jour de l'An",
        [year + '-05-01']: 'Fête du Travail',
        [year + '-05-08']: 'Victoire 1945',
        [year + '-07-14']: 'Fête Nationale',
        [year + '-08-15']: 'Assomption',
        [year + '-11-01']: 'Toussaint',
        [year + '-11-11']: 'Armistice',
        [year + '-12-25']: 'Noël',
        [dateKey(easterMonday)]: 'Lundi de Pâques',
        [dateKey(ascension)]: 'Ascension'
      };
    }
    function getHolidayName(date) {
      return getFrenchHolidays(date.getFullYear())[dateKey(date)] || null;
    }
    function getWeekNumber(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }
    function getMondayOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d);
      monday.setDate(diff);
      monday.setHours(0, 0, 0, 0);
      return monday;
    }
    function timeToMinutes(time) {
      if (!time) return null;
      const p = time.split(':').map(Number);
      return p[0] * 60 + (p[1] || 0);
    }
    function formatHours(minutes) {
      if (!minutes || isNaN(minutes)) return '0h 00';
      const sign = minutes < 0 ? '-' : '';
      const abs = Math.abs(minutes);
      const h = Math.floor(abs / 60);
      const m = Math.round(abs % 60);
      return sign + h + 'h ' + String(m).padStart(2, '0');
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function isoDate(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function parseIsoDate(s) {
      if (!s) return null;
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    // --- Entry helpers ---
    function calcEntryMinutes(entry) {
      if (!entry) return 0;
      const activity = entry.activity || 'au_travail';
      if (!ACTIVITIES[activity] || !ACTIVITIES[activity].isWork) return 0;
      if (!entry.arrival || !entry.departure) return 0;
      const arrival = timeToMinutes(entry.arrival);
      const departure = timeToMinutes(entry.departure);
      const pause = parseInt(entry.pause) || 0;
      if (departure <= arrival) return 0;
      return Math.max(0, departure - arrival - pause);
    }

    function getDayEntries(day) {
      if (!day) return [];
      if (Array.isArray(day)) return day;
      if (typeof day === 'object') return [day]; // backward compat
      return [];
    }

    function calcDayWorkedMinutes(day) {
      return getDayEntries(day).reduce((sum, e) => sum + calcEntryMinutes(e), 0);
    }

    function hasAbsence(day) {
      return getDayEntries(day).some(e => e.activity && ACTIVITIES[e.activity] && !ACTIVITIES[e.activity].isWork);
    }

    function dailyContractualMinutes(settings) {
      const weekly = parseFloat(settings.contractuel) || 35;
      return Math.round((weekly / 5) * 60); // 5 working days assumption
    }

    // Returns how many working days (Mon-Fri) of a given week are within the contract period.
    // monday: Date object for the Monday of the week
    // Returns a number 0..5
    function contractualWorkingDaysInWeek(monday, contractStartIso) {
      if (!contractStartIso) return 5;
      const contractStart = parseIsoDate(contractStartIso);
      if (!contractStart) return 5;
      let count = 0;
      for (let i = 0; i < 5; i++) {
        const d = new Date(monday); d.setDate(monday.getDate() + i);
        d.setHours(0, 0, 0, 0);
        if (d >= contractStart) count++;
      }
      return count;
    }

    // Weekly threshold in minutes for HS/récup calculation
    // = (weekly contracted hours / 5) × number of contractual working days this week
    function weeklyThresholdMin(monday, settings) {
      const dailyMin = dailyContractualMinutes(settings);
      const days = contractualWorkingDaysInWeek(monday, settings.contractStart);
      return dailyMin * days;
    }

    // True if any part of the week is within the contract period
    function isWeekInContract(monday, settings) {
      if (!settings.contractStart) return true;
      const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
      const contractStart = parseIsoDate(settings.contractStart);
      if (!contractStart) return true;
      return sunday >= contractStart;
    }

    // --- State ---
    const state = {
      currentDate: new Date(),
      weekData: {},
      settings: { taux: '', contractuel: 35, contractStart: '2026-05-13', cotisations: 23 },
      showSettings: false,
      showTemplates: false,
      showExport: false,
      exportType: 'week',
      exportStart: isoDate(getMondayOfWeek(new Date())),
      exportEnd: (() => { const d = getMondayOfWeek(new Date()); d.setDate(d.getDate() + 6); return isoDate(d); })()
    };

    function getWeekKey(date) {
      const monday = getMondayOfWeek(date || state.currentDate);
      return 'week-' + monday.getFullYear() + '-W' + String(getWeekNumber(monday)).padStart(2, '0');
    }
    function loadWeek() {
      try {
        const data = localStorage.getItem(getWeekKey());
        const raw = data ? JSON.parse(data) : {};
        // Migrate single-object format to array
        const migrated = {};
        Object.keys(raw).forEach(k => {
          if (Array.isArray(raw[k])) migrated[k] = raw[k];
          else if (raw[k] && typeof raw[k] === 'object') migrated[k] = [raw[k]];
        });
        state.weekData = migrated;
      } catch (e) { state.weekData = {}; }
    }
    function saveWeek() {
      try { localStorage.setItem(getWeekKey(), JSON.stringify(state.weekData)); } catch (e) {}
    }
    function loadSettings() {
      try {
        const data = localStorage.getItem('settings');
        if (data) {
          const p = JSON.parse(data);
          state.settings = {
            taux: p.taux !== undefined ? p.taux : '',
            contractuel: p.contractuel || 35,
            contractStart: p.contractStart || '2026-05-13',
            cotisations: p.cotisations !== undefined ? p.cotisations : 23
          };
        }
      } catch (e) {}
    }
    function saveSettings() {
      try { localStorage.setItem('settings', JSON.stringify(state.settings)); } catch (e) {}
    }

    // --- Paid HS storage ---
    // Structure: { "YYYY-MM": { hs25Min: Number, hs50Min: Number } }
    function loadPaidHS() {
      try {
        const data = localStorage.getItem('paidHS');
        state.paidHS = data ? JSON.parse(data) : {};
      } catch (e) { state.paidHS = {}; }
    }
    function savePaidHS() {
      try { localStorage.setItem('paidHS', JSON.stringify(state.paidHS || {})); } catch (e) {}
    }
    function setPaidHSForMonth(monthKey, hs25Min, hs50Min) {
      if (!state.paidHS) state.paidHS = {};
      if ((!hs25Min || hs25Min === 0) && (!hs50Min || hs50Min === 0)) {
        delete state.paidHS[monthKey];
      } else {
        state.paidHS[monthKey] = {
          hs25Min: hs25Min || 0,
          hs50Min: hs50Min || 0
        };
      }
      savePaidHS();
      render();
    }
    function getPaidHSForMonth(monthKey) {
      if (!state.paidHS) return { hs25Min: 0, hs50Min: 0 };
      return state.paidHS[monthKey] || { hs25Min: 0, hs50Min: 0 };
    }

    // Update paid HS for a month from form inputs (hours format like "5.5" or "5h30")
    function updatePaidHSField(monthKey, field, value) {
      const minutes = parseHoursInput(value);
      const current = getPaidHSForMonth(monthKey);
      const updated = { ...current };
      updated[field] = minutes;
      setPaidHSForMonth(monthKey, updated.hs25Min, updated.hs50Min);
    }
    // Parse input "5", "5.5", "5h30" → minutes
    function parseHoursInput(value) {
      if (!value || value.trim() === '') return 0;
      const v = String(value).trim().toLowerCase();
      // Format "Xh" or "XhYY"
      const hMatch = v.match(/^(\d+)\s*h\s*(\d{0,2})$/);
      if (hMatch) {
        const h = parseInt(hMatch[1]) || 0;
        const m = parseInt(hMatch[2] || '0') || 0;
        return h * 60 + m;
      }
      // Plain number (hours, decimal allowed)
      const n = parseFloat(v.replace(',', '.'));
      if (isNaN(n)) return 0;
      return Math.round(n * 60);
    }

    // --- Actions ---
    function ensureDayArray(dayKey) {
      if (!Array.isArray(state.weekData[dayKey])) {
        const existing = state.weekData[dayKey];
        state.weekData[dayKey] = existing && typeof existing === 'object' ? [existing] : [];
      }
    }

    function addEntry(dayKey) {
      ensureDayArray(dayKey);
      state.weekData[dayKey].push({ activity: 'au_travail' });
      saveWeek(); render();
    }

    function removeEntry(dayKey, idx) {
      ensureDayArray(dayKey);
      state.weekData[dayKey].splice(idx, 1);
      if (state.weekData[dayKey].length === 0) delete state.weekData[dayKey];
      saveWeek(); render();
    }

    let _updateDebounce = null;
    function updateEntry(dayKey, idx, field, value) {
      ensureDayArray(dayKey);
      if (!state.weekData[dayKey][idx]) state.weekData[dayKey][idx] = {};
      state.weekData[dayKey][idx][field] = value;
      saveWeek();
      // For time fields, DON'T re-render: iOS would close the picker mid-selection.
      // Just update the totals/badges via refreshDisplays.
      // For other fields (pause, etc.), same idea — refreshDisplays is enough.
      // Use a debounce so rapid wheel rolls don't fight with each other.
      if (_updateDebounce) clearTimeout(_updateDebounce);
      _updateDebounce = setTimeout(() => { refreshDisplays(); }, 50);
    }

    function refreshDisplays() {
      try {
        const calc = getCalcForWeek(state.currentDate);
        // Day totals + recup badges (these have ids set in renderDayCard)
        DAYS.forEach((d, i) => {
          const entry = calc.entries[i];
          const total = (entry.workedMin || 0) + (entry.autoFerieMin || 0);
          const totalEl = document.getElementById('day-total-' + d.key);
          if (totalEl) {
            totalEl.textContent = formatHours(total);
            totalEl.classList.toggle('day-total-empty', total === 0);
          }
          const recupEl = document.getElementById('day-recup-' + d.key);
          if (recupEl) {
            if (entry.recupMin > 0) {
              recupEl.style.display = '';
              recupEl.textContent = '↻ À récupérer : ' + formatHours(entry.recupMin);
            } else {
              recupEl.style.display = 'none';
            }
          }
        });
        // Mark the summary as stale; user will see updated values on next non-time interaction
        const stale = document.getElementById('summary-stale');
        if (stale) stale.style.display = '';
      } catch (e) {}
    }

    function setEntryActivity(dayKey, idx, activity) {
      ensureDayArray(dayKey);
      const existing = state.weekData[dayKey][idx] || {};
      const isWork = ACTIVITIES[activity] && ACTIVITIES[activity].isWork;
      // If switching to non-work, clear time fields
      state.weekData[dayKey][idx] = isWork
        ? Object.assign({}, existing, { activity })
        : { activity };
      saveWeek(); render();
    }

    function clearDay(dayKey) {
      delete state.weekData[dayKey];
      saveWeek(); render();
    }

    function loadTemplate(name) {
      const tpl = {};
      let arrival, departure;
      if (name === 'conditionnement') { arrival = '09:00'; departure = '16:00'; }
      else if (name === 'brassage') { arrival = '08:00'; departure = '15:00'; }
      ['lundi','mardi','mercredi','jeudi','vendredi'].forEach(k => {
        tpl[k] = [{ activity: 'au_travail', arrival, departure, pause: '0' }];
      });
      state.weekData = tpl;
      state.showTemplates = false;
      saveWeek(); render();
    }

    function goToPrevWeek() { const d = new Date(state.currentDate); d.setDate(d.getDate() - 7); state.currentDate = d; loadWeek(); render(); }
    function goToNextWeek() { const d = new Date(state.currentDate); d.setDate(d.getDate() + 7); state.currentDate = d; loadWeek(); render(); }
    function goToToday() { state.currentDate = new Date(); loadWeek(); render(); }
    function toggleSettings() { state.showSettings = !state.showSettings; render(); }
    function toggleTemplates() { state.showTemplates = !state.showTemplates; render(); }

    function openExport() {
      const monday = getMondayOfWeek(state.currentDate);
      const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
      state.exportStart = isoDate(monday);
      state.exportEnd = isoDate(sunday);
      state.exportType = 'week';
      state.showExport = true;
      render();
    }
    function closeExport() { state.showExport = false; render(); }
    function setExportType(type) {
      state.exportType = type;
      const now = new Date(state.currentDate);
      if (type === 'week') {
        const m = getMondayOfWeek(now);
        const s = new Date(m); s.setDate(m.getDate() + 6);
        state.exportStart = isoDate(m); state.exportEnd = isoDate(s);
      } else if (type === 'month') {
        const first = new Date(now.getFullYear(), now.getMonth(), 1);
        const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        state.exportStart = isoDate(first); state.exportEnd = isoDate(last);
      }
      render();
    }
    function setExportDate(field, value) { state[field] = value; render(); }
    function updateSetting(field, value) { state.settings[field] = value; saveSettings(); render(); }

    // --- Day-level metadata (auto férié, etc.) ---
    // NOTE: HS and à-récupérer are no longer computed per day. They are derived
    // at the week level by comparing the total worked hours of the week to the
    // contractual weekly threshold (35h by default, prorated for the first
    // contract week).
    function getDayMeta(day, date, dayIndex, settings) {
      const dailyMin = dailyContractualMinutes(settings); // e.g. 420 for 7h
      const isWorkingDay = dayIndex < 5; // Mon-Fri
      const ferie = getHolidayName(date);
      const entries = getDayEntries(day);
      const hasAny = entries.length > 0;
      const workedMin = calcDayWorkedMinutes(day);
      const absencePresent = hasAbsence(day);

      const meta = {
        workedMin,
        dailyMin,
        isWorkingDay,
        ferie,
        absencePresent,
        // Férié non-travaillé auto: counts as dailyMin normal hours, fills the day
        ferieAutoMin: 0,
        // Worked on férié (for +100% bonus calc)
        ferieWorkedMin: 0
      };

      if (ferie && isWorkingDay && !hasAny) {
        // Empty férié on working day → auto 7h normal
        meta.ferieAutoMin = dailyMin;
      } else if (workedMin > 0 && ferie) {
        // Worked on férié → bonus on worked hours
        meta.ferieWorkedMin = workedMin;
      }

      return meta;
    }

    // --- Récup ledger (monthly compensation) ---
    // 1h HS25 worked recovers 1h15 of récup debt (factor 1.25)
    // 1h HS50 worked recovers 1h30 of récup debt (factor 1.5)
    // HS25 is used first to repay debt (so HS50 stays "paid" if possible)
    // Compensation happens within a calendar month: any HS in the month can repay any récup in the same month, regardless of week order.

    function getAllStoredWeekKeys() {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && /^week-\d{4}-W\d{2}$/.test(k)) keys.push(k);
      }
      return keys.sort();
    }

    // Compute raw weekly stats: walks through all stored weeks, computes per-week
    // HS25, HS50, and recuperation (all calculated at the WEEK level, not per day).
    // Returns:
    //   - perDay: Map(isoDate -> {workedMin, weekKey, date, inContract})
    //   - perWeek: Map(weekKey -> {monday, hs25Min, hs50Min, recupMin, workedMin, inContract})
    //   - perMonth: Map('YYYY-MM' -> {hs25Min, hs50Min, recupMin})
    // Note: perMonth aggregates by attributing each week's HS/récup to the MONTH OF ITS MONDAY
    // (or split proportionally across days for weeks straddling two months).
    function computeAllDailyStats() {
      const perDay = new Map();
      const perWeek = new Map();
      const perMonth = new Map();
      const weekKeys = getAllStoredWeekKeys();
      const contractStart = state.settings.contractStart ? parseIsoDate(state.settings.contractStart) : null;

      for (const wKey of weekKeys) {
        let weekData = {};
        try {
          const raw = JSON.parse(localStorage.getItem(wKey) || '{}');
          Object.keys(raw).forEach(k => {
            if (Array.isArray(raw[k])) weekData[k] = raw[k];
            else if (raw[k] && typeof raw[k] === 'object') weekData[k] = [raw[k]];
          });
        } catch (e) { weekData = {}; }

        const match = wKey.match(/^week-(\d{4})-W(\d{2})$/);
        if (!match) continue;
        const year = parseInt(match[1]);
        const week = parseInt(match[2]);
        const jan4 = new Date(year, 0, 4);
        const jan4Day = jan4.getDay() || 7;
        const week1Monday = new Date(jan4);
        week1Monday.setDate(jan4.getDate() - jan4Day + 1);
        const monday = new Date(week1Monday);
        monday.setDate(week1Monday.getDate() + (week - 1) * 7);
        monday.setHours(0, 0, 0, 0);

        // If the entire week is before contract start, skip entirely
        if (!isWeekInContract(monday, state.settings)) continue;

        // Walk the 7 days, tracking which are in contract and total "covered" hours
        // Covered hours = worked + auto-férié + absence (congé/maladie/arrêt = journée couverte)
        let weekWorkedMin = 0;       // strict worked hours (for display only)
        let weekCoveredMin = 0;      // worked + ferie auto + full-day absence (for HS/récup calc)
        const dayInfos = [];
        for (let i = 0; i < 7; i++) {
          const date = new Date(monday); date.setDate(monday.getDate() + i);
          date.setHours(0, 0, 0, 0);
          const meta = getDayMeta(weekData[DAYS[i].key], date, i, state.settings);
          const inContract = !contractStart || date >= contractStart;
          const countedWorked = inContract ? meta.workedMin : 0;
          // Auto férié credit: 7h normal added to weekly total
          const countedFerieAuto = inContract ? meta.ferieAutoMin : 0;
          // Absence: if a working day has an absence entry and no work, day is "covered" by 7h
          const isWorkingDay = meta.isWorkingDay;
          let countedAbsence = 0;
          if (inContract && isWorkingDay && meta.absencePresent && meta.workedMin === 0 && !meta.ferie) {
            countedAbsence = meta.dailyMin;
          }
          weekWorkedMin += countedWorked;
          weekCoveredMin += countedWorked + countedFerieAuto + countedAbsence;
          dayInfos.push({ date, meta, inContract });
          const iso = isoDate(date);
          perDay.set(iso, { workedMin: meta.workedMin, weekKey: wKey, date, inContract });
        }

        // Weekly threshold (prorated for partial contract week)
        const thresholdMin = weeklyThresholdMin(monday, state.settings);

        // HS / récup at week level, based on COVERED hours (so férié & absences don't trigger récup)
        const delta = weekCoveredMin - thresholdMin;
        let weekHS25Min = 0, weekHS50Min = 0, weekRecupMin = 0;
        if (delta > 0) {
          // Over threshold → HS. The excess can only come from worked hours,
          // since férié/absence credits only fill up to the daily target.
          weekHS25Min = Math.min(delta, 8 * 60);
          weekHS50Min = Math.max(0, delta - 8 * 60);
        } else if (delta < 0) {
          // Under threshold → à récupérer
          weekRecupMin = -delta;
        }

        perWeek.set(wKey, {
          monday,
          thresholdMin,
          workedMin: weekWorkedMin,
          hs25Min: weekHS25Min,
          hs50Min: weekHS50Min,
          recupMin: weekRecupMin
        });

        // Attribute to month(s): use the MONDAY's month as primary attribution
        // (Simpler and matches the way users see their payslip period.)
        const monthKey = monday.getFullYear() + '-' + String(monday.getMonth() + 1).padStart(2, '0');
        if (!perMonth.has(monthKey)) perMonth.set(monthKey, { hs25Min: 0, hs50Min: 0, recupMin: 0 });
        const m = perMonth.get(monthKey);
        m.hs25Min += weekHS25Min;
        m.hs50Min += weekHS50Min;
        m.recupMin += weekRecupMin;
      }
      return { perDay, perWeek, perMonth };
    }

    // Apply récup compensation against HS, within a single bucket (a month).
    // No carryover between months: each month settles its own balance.
    function applyMonthlyRecup(hs25Min, hs50Min, recupMin) {
      let debt = recupMin || 0;
      let paidHS25 = hs25Min;
      let paidHS50 = hs50Min;
      let consumedHS25 = 0, consumedHS50 = 0;
      if (debt > 0 && paidHS25 > 0) {
        const credit = paidHS25 * 1.25;
        if (credit >= debt) {
          const used = debt / 1.25;
          consumedHS25 = used;
          paidHS25 -= used;
          debt = 0;
        } else {
          consumedHS25 = paidHS25;
          debt -= credit;
          paidHS25 = 0;
        }
      }
      if (debt > 0 && paidHS50 > 0) {
        const credit = paidHS50 * 1.5;
        if (credit >= debt) {
          const used = debt / 1.5;
          consumedHS50 = used;
          paidHS50 -= used;
          debt = 0;
        } else {
          consumedHS50 = paidHS50;
          debt -= credit;
          paidHS50 = 0;
        }
      }
      return { paidHS25, paidHS50, consumedHS25, consumedHS50, outgoingDebt: debt };
    }

    // Compute the resolved state of all months: for each month, returns
    // the netHS25, netHS50, debt remaining, consumed HS, paidHS, owedHS (carried over)
    function resolveAllMonths() {
      const { perDay, perWeek, perMonth } = computeAllDailyStats();
      const monthResults = new Map();

      // Group weeks by month
      const weeksByMonth = new Map();
      perWeek.forEach((weekStats, wKey) => {
        const monthKey = weekStats.monday.getFullYear() + '-' + String(weekStats.monday.getMonth() + 1).padStart(2, '0');
        if (!weeksByMonth.has(monthKey)) weeksByMonth.set(monthKey, []);
        weeksByMonth.get(monthKey).push(wKey);
      });
      weeksByMonth.forEach((wKeys) => {
        wKeys.sort((a, b) => perWeek.get(a).monday - perWeek.get(b).monday);
      });

      const weekNetHS = new Map();

      // Process months in chronological order to propagate unpaid HS to next month
      const sortedMonthKeys = Array.from(perMonth.keys()).sort();
      // Also include any months that have paid HS recorded but no work data, to keep them visible
      if (state.paidHS) {
        Object.keys(state.paidHS).forEach(k => {
          if (!sortedMonthKeys.includes(k)) sortedMonthKeys.push(k);
        });
        sortedMonthKeys.sort();
      }

      let carryHS25 = 0, carryHS50 = 0; // owed HS carried over from previous month

      for (const monthKey of sortedMonthKeys) {
        const stats = perMonth.get(monthKey) || { hs25Min: 0, hs50Min: 0, recupMin: 0 };

        // Add carryover from previous month
        const totalHS25BeforePay = stats.hs25Min + carryHS25;
        const totalHS50BeforePay = stats.hs50Min + carryHS50;

        // First, récup consumes HS (HS25 prioritaire)
        const res = applyMonthlyRecup(totalHS25BeforePay, totalHS50BeforePay, stats.recupMin);
        // res.paidHS25/50 = HS remaining after récup compensation (these are net HS, before paid HS deduction)

        // Then, user-declared paid HS are deducted from those net HS
        const paid = getPaidHSForMonth(monthKey);
        const paidHS25 = Math.min(paid.hs25Min, res.paidHS25);
        const paidHS50 = Math.min(paid.hs50Min, res.paidHS50);

        // Unpaid HS = what remains after paying → carried to next month
        const unpaidHS25 = res.paidHS25 - paidHS25;
        const unpaidHS50 = res.paidHS50 - paidHS50;

        monthResults.set(monthKey, {
          // Original month's HS (no carryover)
          hs25Min: stats.hs25Min,
          hs50Min: stats.hs50Min,
          recupMin: stats.recupMin,
          // Carryover from previous month
          carryInHS25Min: carryHS25,
          carryInHS50Min: carryHS50,
          // Total before paid (used for recup compensation)
          totalHS25BeforePay,
          totalHS50BeforePay,
          // Net HS after récup compensation
          netHS25Min: res.paidHS25,
          netHS50Min: res.paidHS50,
          consumedHS25Min: res.consumedHS25,
          consumedHS50Min: res.consumedHS50,
          remainingDebtMin: res.outgoingDebt,
          // Paid HS (declared by user)
          paidHS25Min: paidHS25,
          paidHS50Min: paidHS50,
          // Unpaid HS (carried to next month)
          carryOutHS25Min: unpaidHS25,
          carryOutHS50Min: unpaidHS50
        });

        // Attribute consumed HS25 / HS50 to weeks of this month chronologically
        // (consumption comes from the month's own HS first, then carry; but we only track
        // attribution to weeks of the current month for display purposes)
        const wKeys = weeksByMonth.get(monthKey) || [];
        // Consumed from this month's brut HS = total consumed - consumed from carryover
        // Carry HS are consumed first (FIFO: oldest HS pay récup first)
        let consumedFromCarry25 = Math.min(res.consumedHS25, carryHS25);
        let consumedFromMonth25 = res.consumedHS25 - consumedFromCarry25;
        let consumedFromCarry50 = Math.min(res.consumedHS50, carryHS50);
        let consumedFromMonth50 = res.consumedHS50 - consumedFromCarry50;
        let remainingHS25ToConsume = consumedFromMonth25;
        let remainingHS50ToConsume = consumedFromMonth50;
        for (const wKey of wKeys) {
          const ws = perWeek.get(wKey);
          const wConsumedHS25 = Math.min(remainingHS25ToConsume, ws.hs25Min);
          remainingHS25ToConsume -= wConsumedHS25;
          const wConsumedHS50 = Math.min(remainingHS50ToConsume, ws.hs50Min);
          remainingHS50ToConsume -= wConsumedHS50;
          weekNetHS.set(wKey, {
            netHS25: ws.hs25Min - wConsumedHS25,
            netHS50: ws.hs50Min - wConsumedHS50,
            consumedHS25: wConsumedHS25,
            consumedHS50: wConsumedHS50
          });
        }

        // Propagate unpaid HS to next month
        carryHS25 = unpaidHS25;
        carryHS50 = unpaidHS50;
      }

      return { perDay, perWeek, perMonth, monthResults, weekNetHS };
    }

    // Compute cumulative ledger up to and including a given date
    function getRecupLedgerThroughDate(throughDate) {
      const { monthResults } = resolveAllMonths();
      const throughMonthKey = throughDate.getFullYear() + '-' + String(throughDate.getMonth() + 1).padStart(2, '0');
      let totalCreatedMin = 0;
      let totalRecoveredMin = 0;
      let totalHS25ConsumedMin = 0;
      let totalHS50ConsumedMin = 0;
      let totalRemainingMin = 0;
      // Sort month keys
      const sortedKeys = Array.from(monthResults.keys()).sort();
      for (const mKey of sortedKeys) {
        if (mKey > throughMonthKey) break;
        const m = monthResults.get(mKey);
        totalCreatedMin += m.recupMin;
        totalRecoveredMin += m.consumedHS25Min * 1.25 + m.consumedHS50Min * 1.5;
        totalHS25ConsumedMin += m.consumedHS25Min;
        totalHS50ConsumedMin += m.consumedHS50Min;
        totalRemainingMin += m.remainingDebtMin;
      }
      return { totalCreatedMin, totalRecoveredMin, debt: totalRemainingMin, totalHS25ConsumedMin, totalHS50ConsumedMin };
    }

    // For weekly view: gets this week's brut HS/récup from perWeek,
    // then uses the chronological per-week attribution of HS consumption.
    function getWeekResolvedStats(monday) {
      const wKey = 'week-' + monday.getFullYear() + '-W' + String(getWeekNumber(monday)).padStart(2, '0');
      const { perWeek, weekNetHS } = resolveAllMonths();

      const weekStats = perWeek.get(wKey);
      if (!weekStats) {
        return { hs25BrutMin: 0, hs50BrutMin: 0, netHS25Min: 0, netHS50Min: 0, recupMin: 0, thresholdMin: weeklyThresholdMin(monday, state.settings) };
      }

      const wNet = weekNetHS.get(wKey) || { netHS25: weekStats.hs25Min, netHS50: weekStats.hs50Min };

      return {
        hs25BrutMin: weekStats.hs25Min,
        hs50BrutMin: weekStats.hs50Min,
        netHS25Min: wNet.netHS25,
        netHS50Min: wNet.netHS50,
        recupMin: weekStats.recupMin,
        thresholdMin: weekStats.thresholdMin
      };
    }

    // Get full month resolution for a given date
    function getMonthResolution(date) {
      const monthKey = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
      const { monthResults } = resolveAllMonths();
      return monthResults.get(monthKey) || null;
    }

    // --- Calculations ---
    function getCurrentCalc() {
      const monday = getMondayOfWeek(state.currentDate);
      const settings = state.settings;
      let workedMin = 0, ferieWorkedMin = 0, ferieAutoMin = 0;

      DAYS.forEach((d, i) => {
        const date = new Date(monday); date.setDate(monday.getDate() + i);
        const meta = getDayMeta(state.weekData[d.key], date, i, settings);
        workedMin += meta.workedMin;
        ferieWorkedMin += meta.ferieWorkedMin;
        ferieAutoMin += meta.ferieAutoMin;
      });

      // Get week-level HS/récup and net (after monthly compensation)
      const weekResolved = getWeekResolvedStats(monday);
      const hs25Raw = weekResolved.hs25BrutMin / 60;
      const hs50Raw = weekResolved.hs50BrutMin / 60;
      const recuperationMin = weekResolved.recupMin;
      const thresholdMin = weekResolved.thresholdMin;
      const netHS25 = weekResolved.netHS25Min / 60;
      const netHS50 = weekResolved.netHS50Min / 60;

      // Hours normales = worked up to the threshold (or worked if less than threshold)
      const heuresNormalesMin = Math.min(workedMin, thresholdMin);
      const heuresNormales = heuresNormalesMin / 60;
      const totalHours = workedMin / 60;
      const inContract = isWeekInContract(monday, settings);

      const taux = parseFloat(settings.taux) || 0;
      const ferieAutoH = ferieAutoMin / 60;
      const ferieWorkedH = ferieWorkedMin / 60;

      // Salary based on NET HS (HS that paid récup are consumed, not paid in salary)
      const salaireBase = (heuresNormales + ferieAutoH) * taux;
      const salaireHS25 = netHS25 * taux * 1.25;
      const salaireHS50 = netHS50 * taux * 1.5;
      const bonusFerie = ferieWorkedH * taux;
      const salaireTotal = salaireBase + salaireHS25 + salaireHS50 + bonusFerie;
      const majoration = netHS25 * taux * 0.25 + netHS50 * taux * 0.5 + bonusFerie;

      // Cumulative ledger through this week
      const sundayOfWeek = new Date(monday); sundayOfWeek.setDate(monday.getDate() + 6);
      const ledger = getRecupLedgerThroughDate(sundayOfWeek);

      // Month info: for the month containing currentDate
      const monthRes = getMonthResolution(state.currentDate);
      const monthInfo = monthRes ? {
        hs25Min: monthRes.hs25Min,
        hs50Min: monthRes.hs50Min,
        carryInHS25Min: monthRes.carryInHS25Min,
        carryInHS50Min: monthRes.carryInHS50Min,
        netHS25Min: monthRes.netHS25Min,
        netHS50Min: monthRes.netHS50Min,
        paidHS25Min: monthRes.paidHS25Min,
        paidHS50Min: monthRes.paidHS50Min,
        carryOutHS25Min: monthRes.carryOutHS25Min,
        carryOutHS50Min: monthRes.carryOutHS50Min
      } : null;

      return {
        workedMin, ferieWorkedMin, ferieAutoMin, recuperationMin,
        totalHours, ferieAutoH, ferieWorkedH,
        recupH: recuperationMin / 60,
        ledgerCreatedMin: ledger.totalCreatedMin,
        ledgerRecoveredMin: ledger.totalRecoveredMin,
        ledgerRemainingMin: ledger.debt,
        ledgerHS25ConsumedMin: ledger.totalHS25ConsumedMin,
        ledgerHS50ConsumedMin: ledger.totalHS50ConsumedMin,
        heuresNormales,
        hs25Raw, hs50Raw,
        netHS25, netHS50,
        thresholdMin, inContract,
        monthInfo,
        taux, salaireBase, salaireHS25, salaireHS50, bonusFerie, salaireTotal, majoration
      };
    }

    // For export: aggregate over a date range
    function calcRange(startDate, endDate) {
      const seuil = parseFloat(state.settings.contractuel) || 35;
      const taux = parseFloat(state.settings.taux) || 0;
      const loadedWeeks = {};
      const entries = [];
      const weeklyTotals = {}; // wKey -> {worked, ferieWorked, ferieAuto, recuperation}
      const absencesCount = { conges: 0, maladie: 0, arret: 0, recuperation: 0 };

      const cur = new Date(startDate); cur.setHours(0,0,0,0);
      const end = new Date(endDate); end.setHours(23,59,59,999);

      while (cur <= end) {
        const monday = getMondayOfWeek(cur);
        const wKey = 'week-' + monday.getFullYear() + '-W' + String(getWeekNumber(monday)).padStart(2, '0');
        if (!loadedWeeks[wKey]) {
          try {
            const raw = JSON.parse(localStorage.getItem(wKey) || '{}');
            const migrated = {};
            Object.keys(raw).forEach(k => {
              if (Array.isArray(raw[k])) migrated[k] = raw[k];
              else if (raw[k] && typeof raw[k] === 'object') migrated[k] = [raw[k]];
            });
            loadedWeeks[wKey] = migrated;
          } catch (e) { loadedWeeks[wKey] = {}; }
        }
        const dayIndex = (cur.getDay() + 6) % 7;
        const dayKey = DAYS[dayIndex].key;
        const dayData = loadedWeeks[wKey][dayKey];
        const meta = getDayMeta(dayData, cur, dayIndex, state.settings);
        const dayEntries = getDayEntries(dayData);

        // Count absences (per absence entry seen)
        dayEntries.forEach(e => {
          if (e.activity && !ACTIVITIES[e.activity].isWork) {
            absencesCount[e.activity] = (absencesCount[e.activity] || 0) + 1;
          }
        });

        entries.push({
          date: new Date(cur),
          dayName: DAYS[dayIndex].label,
          entries: dayEntries,
          meta
        });

        if (!weeklyTotals[wKey]) weeklyTotals[wKey] = { worked: 0, ferieWorked: 0, ferieAuto: 0 };
        weeklyTotals[wKey].worked += meta.workedMin;
        weeklyTotals[wKey].ferieWorked += meta.ferieWorkedMin;
        weeklyTotals[wKey].ferieAuto += meta.ferieAutoMin;

        cur.setDate(cur.getDate() + 1);
      }

      // Process: use weekly + monthly resolution with chronological per-week attribution
      const { perWeek, monthResults, weekNetHS } = resolveAllMonths();

      let totalWorked = 0, totalFerieWorked = 0, totalFerieAuto = 0, totalRecuperation = 0;
      let totalNormal = 0, totalHS25Brut = 0, totalHS50Brut = 0;
      let totalPaidHS25 = 0, totalPaidHS50 = 0;

      // Aggregate over weeks that fall within the range
      const startD = new Date(startDate); startD.setHours(0,0,0,0);
      const endD = new Date(endDate); endD.setHours(0,0,0,0);
      const seenWeeks = new Set();
      perWeek.forEach((weekStats, wKey) => {
        const wMonday = weekStats.monday;
        const wSunday = new Date(wMonday); wSunday.setDate(wMonday.getDate() + 6);
        if (wMonday <= endD && wSunday >= startD) {
          seenWeeks.add(wKey);
          totalHS25Brut += weekStats.hs25Min;
          totalHS50Brut += weekStats.hs50Min;
          totalRecuperation += weekStats.recupMin;
          const wNet = weekNetHS.get(wKey);
          if (wNet) {
            totalPaidHS25 += wNet.netHS25;
            totalPaidHS50 += wNet.netHS50;
          } else {
            totalPaidHS25 += weekStats.hs25Min;
            totalPaidHS50 += weekStats.hs50Min;
          }
        }
      });

      // Aggregate worked / férié totals from weekly totals (no change there)
      Object.values(weeklyTotals).forEach(wt => {
        totalWorked += wt.worked;
        totalFerieWorked += wt.ferieWorked;
        totalFerieAuto += wt.ferieAuto;
      });
      totalNormal = totalWorked - totalHS25Brut - totalHS50Brut;
      if (totalNormal < 0) totalNormal = 0;

      const hs25H = totalPaidHS25 / 60;
      const hs50H = totalPaidHS50 / 60;
      const normalH = totalNormal / 60;
      const ferieAutoH = totalFerieAuto / 60;
      const ferieWorkedH = totalFerieWorked / 60;
      const recupH = totalRecuperation / 60;

      // Ledger up through the end of the range
      const ledger = getRecupLedgerThroughDate(endDate);
      const incomingDebtH = 0;
      const outgoingDebtH = ledger.debt / 60;

      const salaireBase = (normalH + ferieAutoH) * taux;
      const salaireHS25 = hs25H * taux * 1.25;
      const salaireHS50 = hs50H * taux * 1.5;
      const bonusFerie = ferieWorkedH * taux;
      const salaireTotal = salaireBase + salaireHS25 + salaireHS50 + bonusFerie;
      const majoration = hs25H * taux * 0.25 + hs50H * taux * 0.5 + bonusFerie;

      return {
        entries, weekCount: Object.keys(weeklyTotals).length,
        totalWorked, totalNormal,
        totalHS25Min: totalPaidHS25, totalHS50Min: totalPaidHS50,
        totalHS25BrutMin: totalHS25Brut, totalHS50BrutMin: totalHS50Brut,
        totalFerieWorked, totalFerieAuto, totalRecuperation,
        netHS25: hs25H, netHS50: hs50H,
        incomingDebtH, outgoingDebtH,
        ledgerCreatedMin: ledger.totalCreatedMin,
        ledgerRecoveredMin: ledger.totalRecoveredMin,
        ledgerRemainingMin: ledger.debt,
        ledgerHS25ConsumedMin: ledger.totalHS25ConsumedMin,
        ledgerHS50ConsumedMin: ledger.totalHS50ConsumedMin,
        // Owed HS at end of range: take carryOut of the last month in the range
        owedHS25Min: (function() {
          const lastMonthKey = endDate.getFullYear() + '-' + String(endDate.getMonth() + 1).padStart(2, '0');
          const m = monthResults.get(lastMonthKey);
          return m ? m.carryOutHS25Min : 0;
        })(),
        owedHS50Min: (function() {
          const lastMonthKey = endDate.getFullYear() + '-' + String(endDate.getMonth() + 1).padStart(2, '0');
          const m = monthResults.get(lastMonthKey);
          return m ? m.carryOutHS50Min : 0;
        })(),
        taux, salaireBase, salaireHS25, salaireHS50, bonusFerie, salaireTotal, majoration,
        absences: absencesCount, seuil
      };
    }

    // --- Backup / Restore ---
    function gatherAllData() {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        app: 'feuille-de-temps',
        settings: state.settings,
        paidHS: state.paidHS || {},
        weeks: {}
      };
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && /^week-\d{4}-W\d{2}$/.test(k)) {
          try { data.weeks[k] = JSON.parse(localStorage.getItem(k)); }
          catch (e) {}
        }
      }
      return data;
    }

    async function backupToFiles() {
      const data = gatherAllData();
      const today = new Date();
      const dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
      const filename = 'feuille-temps-backup-' + dateStr + '.json';
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });

      // Try the modern File System Access API first (works on some browsers)
      // Then fall back to navigator.share for iOS (which surfaces "Save to Files")
      // Finally fall back to download link.

      // iOS Safari supports navigator.share with files - this brings up the iOS share sheet
      // including "Save to Files" → iCloud Drive
      const file = new File([blob], filename, { type: 'application/json' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: 'Sauvegarde feuille de temps',
            text: 'Sauvegarde du ' + today.toLocaleDateString('fr-FR')
          });
          // Mark backup as done
          try { localStorage.setItem('lastBackup', today.toISOString()); } catch (e) {}
          alert('Sauvegarde proposée. Choisis "Enregistrer dans Fichiers" → iCloud Drive pour la sauver durablement.');
          render();
          return;
        } catch (err) {
          // User cancelled or share failed - fall through to download
          if (err.name === 'AbortError') return;
        }
      }

      // Fallback: classic download
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      try { localStorage.setItem('lastBackup', today.toISOString()); } catch (e) {}
      render();
    }

    function triggerRestore() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json,.json';
      input.onchange = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data || data.app !== 'feuille-de-temps' || !data.weeks) {
              alert('Ce fichier n\'est pas une sauvegarde valide de Feuille de temps.');
              return;
            }
            const weekCount = Object.keys(data.weeks).length;
            const exportedAt = data.exportedAt ? new Date(data.exportedAt).toLocaleString('fr-FR') : 'date inconnue';
            const ok = confirm(`Restaurer cette sauvegarde ?\n\nDate : ${exportedAt}\nSemaines : ${weekCount}\n\n⚠️ Cette opération REMPLACERA toutes les données actuelles.`);
            if (!ok) return;

            // Clear current week data, settings, and paidHS
            const toRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (k && (/^week-\d{4}-W\d{2}$/.test(k) || k === 'settings' || k === 'paidHS')) toRemove.push(k);
            }
            toRemove.forEach(k => localStorage.removeItem(k));

            // Restore
            if (data.settings) localStorage.setItem('settings', JSON.stringify(data.settings));
            if (data.paidHS) localStorage.setItem('paidHS', JSON.stringify(data.paidHS));
            Object.keys(data.weeks).forEach(k => {
              localStorage.setItem(k, JSON.stringify(data.weeks[k]));
            });

            loadSettings();
            loadPaidHS();
            loadWeek();
            alert('Restauration réussie : ' + weekCount + ' semaines.');
            render();
          } catch (err) {
            alert('Erreur lors de la lecture du fichier : ' + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function getBackupStatus() {
      try {
        const last = localStorage.getItem('lastBackup');
        if (!last) return { never: true };
        const lastDate = new Date(last);
        const daysSince = Math.floor((Date.now() - lastDate.getTime()) / (1000 * 60 * 60 * 24));
        return { never: false, lastDate, daysSince };
      } catch (e) {
        return { never: true };
      }
    }

    // --- PDF ---
    function generatePDF() {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        alert("La librairie PDF n'est pas chargée. Vérifie ta connexion internet et recharge la page.");
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

      const startDate = parseIsoDate(state.exportStart);
      const endDate = parseIsoDate(state.exportEnd);
      if (!startDate || !endDate || startDate > endDate) {
        alert('Plage de dates invalide.'); return;
      }

      const r = calcRange(startDate, endDate);
      const pageW = doc.internal.pageSize.getWidth();
      const margin = 15;

      const COL = {
        ink: [26, 22, 18], muted: [122, 111, 92], gold: [184, 132, 47],
        cream: [251, 245, 236], creamDark: [244, 236, 220],
        ferie: [154, 79, 62], border: [224, 212, 190],
        warning: [232, 149, 71], success: [91, 123, 91]
      };

      doc.setFillColor(...COL.ink);
      doc.rect(0, 0, pageW, 8, 'F');

      doc.setFont('times', 'italic'); doc.setFontSize(28); doc.setTextColor(...COL.ink);
      doc.text('Feuille de temps', margin, 25);
      const titleWidth = doc.getTextWidth('Feuille de temps');
      doc.setFont('times', 'normal'); doc.setFontSize(16); doc.setTextColor(...COL.muted);
      doc.text('· Loïc', margin + titleWidth + 4, 25);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(...COL.muted);
      doc.text('Suivi des heures · droit français', margin, 31);

      const fmt = (d) => d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      const periodLabel = state.exportType === 'week'
        ? `Semaine ${getWeekNumber(startDate)}`
        : state.exportType === 'month'
          ? startDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })
          : 'Période personnalisée';
      doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(...COL.ink);
      const pTW = doc.getTextWidth(periodLabel);
      doc.text(periodLabel, pageW - margin - pTW, 25);
      doc.setFont('times', 'italic'); doc.setFontSize(9); doc.setTextColor(...COL.muted);
      const dateRange = `${fmt(startDate)} — ${fmt(endDate)}`;
      const drW = doc.getTextWidth(dateRange);
      doc.text(dateRange, pageW - margin - drW, 31);

      doc.setDrawColor(...COL.border); doc.setLineWidth(0.3);
      doc.line(margin, 38, pageW - margin, 38);

      // Summary box
      const summaryY = 46;
      const summaryH = 38;
      doc.setFillColor(...COL.ink);
      doc.roundedRect(margin, summaryY, pageW - 2 * margin, summaryH, 3, 3, 'F');

      // Compute "dont récupérées" portions for each tier:
      // For the displayed brut values, we show the BRUT amounts (before récup deduction)
      // and a sub-line indicating how many of those were used to repay récup debt.
      const hs25BrutMin = r.totalHS25BrutMin || 0;
      const hs50BrutMin = r.totalHS50BrutMin || 0;
      const hs25UsedForRecupMin = hs25BrutMin - (r.netHS25 * 60);
      const hs50UsedForRecupMin = hs50BrutMin - (r.netHS50 * 60);

      const colW = (pageW - 2 * margin) / 4;
      const cells = [
        { label: 'Travaillé', value: formatHours(r.totalWorked), sub: null },
        { label: 'Normales', value: formatHours(r.totalNormal + r.totalFerieAuto), sub: null },
        { label: 'HS 25%', value: formatHours(hs25BrutMin), highlight: hs25BrutMin > 0, sub: hs25UsedForRecupMin > 0 ? 'dont ' + formatHours(hs25UsedForRecupMin) + ' récupérées' : null },
        { label: 'HS 50%', value: formatHours(hs50BrutMin), highlight: hs50BrutMin > 0, sub: hs50UsedForRecupMin > 0 ? 'dont ' + formatHours(hs50UsedForRecupMin) + ' récupérées' : null }
      ];
      cells.forEach((c, i) => {
        const cx = margin + i * colW + colW / 2;
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
        doc.setTextColor(168, 159, 144);
        doc.text(c.label.toUpperCase(), cx, summaryY + 10, { align: 'center', charSpace: 0.5 });
        doc.setFont('courier', 'bold'); doc.setFontSize(15);
        doc.setTextColor(...(c.highlight ? [232, 181, 71] : COL.cream));
        doc.text(c.value, cx, summaryY + 21, { align: 'center' });
        if (c.sub) {
          doc.setFont('helvetica', 'italic'); doc.setFontSize(6.5);
          doc.setTextColor(168, 159, 144);
          doc.text(c.sub, cx, summaryY + 30, { align: 'center' });
        }
      });
      let cursorY = summaryY + summaryH + 8;

      // Recuperation ledger block: shown only when relevant (debt > 0 OR there's been activity)
      const ledgerCreated = r.ledgerCreatedMin || 0;
      const ledgerRemaining = r.ledgerRemainingMin || 0;
      // Skip the block entirely if everything is cleared (no récup created OR fully recovered with zero balance)
      if (ledgerCreated > 0 && ledgerRemaining > 0) {
        const hs25CMin = r.ledgerHS25ConsumedMin || 0;
        const hs50CMin = r.ledgerHS50ConsumedMin || 0;
        const breakdownParts = [];
        if (hs25CMin > 0) breakdownParts.push(formatHours(hs25CMin) + ' HS 25%');
        if (hs50CMin > 0) breakdownParts.push(formatHours(hs50CMin) + ' HS 50%');
        const hasBreakdown = breakdownParts.length > 0;
        const blockH = hasBreakdown ? 30 : 26;
        doc.setFillColor(254, 242, 226);
        doc.setDrawColor(232, 149, 71);
        doc.setLineWidth(0.3);
        doc.roundedRect(margin, cursorY, pageW - 2 * margin, blockH, 2, 2, 'FD');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
        doc.setTextColor(154, 99, 47);
        doc.text('Récupération · journal cumulé', margin + 4, cursorY + 7);

        const colsW = (pageW - 2 * margin) / 3;
        const cells = [
          { label: 'CRÉÉES', value: formatHours(ledgerCreated), color: COL.muted },
          { label: 'RÉCUPÉRÉES', value: formatHours(r.ledgerRecoveredMin || 0), color: [91, 123, 91], sub: hasBreakdown ? 'dont ' + breakdownParts.join(' + ') : null },
          { label: 'SOLDE RESTANT', value: formatHours(ledgerRemaining), color: COL.warning }
        ];
        cells.forEach((c, i) => {
          const cx = margin + i * colsW + colsW / 2;
          doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5);
          doc.setTextColor(...COL.muted);
          doc.text(c.label, cx, cursorY + 14, { align: 'center', charSpace: 0.5 });
          doc.setFont('courier', 'bold'); doc.setFontSize(11);
          doc.setTextColor(...c.color);
          doc.text(c.value, cx, cursorY + 21, { align: 'center' });
          if (c.sub) {
            doc.setFont('helvetica', 'italic'); doc.setFontSize(6);
            doc.setTextColor(...COL.muted);
            doc.text(c.sub, cx, cursorY + 27, { align: 'center' });
          }
        });
        cursorY += blockH + 4;
      }

      // Heures dues block (HS not paid yet, carried to next month)
      const owedHS25 = r.owedHS25Min || 0;
      const owedHS50 = r.owedHS50Min || 0;
      if (owedHS25 > 0 || owedHS50 > 0) {
        const blockH = 22;
        doc.setFillColor(244, 230, 204);
        doc.setDrawColor(184, 132, 47);
        doc.setLineWidth(0.3);
        doc.roundedRect(margin, cursorY, pageW - 2 * margin, blockH, 2, 2, 'FD');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
        doc.setTextColor(138, 99, 32);
        doc.text('Heures supplémentaires dues (reportées au mois suivant)', margin + 4, cursorY + 7);

        const colsW = (pageW - 2 * margin) / 2;
        const cells = [
          { label: 'HS 25% DUES', value: formatHours(owedHS25), color: [138, 99, 32] },
          { label: 'HS 50% DUES', value: formatHours(owedHS50), color: [138, 99, 32] }
        ];
        cells.forEach((c, i) => {
          const cx = margin + i * colsW + colsW / 2;
          doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5);
          doc.setTextColor(...COL.muted);
          doc.text(c.label, cx, cursorY + 13, { align: 'center', charSpace: 0.5 });
          doc.setFont('courier', 'bold'); doc.setFontSize(11);
          doc.setTextColor(...c.color);
          doc.text(c.value, cx, cursorY + 19, { align: 'center' });
        });
        cursorY += blockH + 4;
      }

      // Détail férié
      if (r.totalFerieWorked > 0 || r.totalFerieAuto > 0) {
        doc.setFillColor(...COL.creamDark);
        doc.roundedRect(margin, cursorY, pageW - 2 * margin, 14, 2, 2, 'F');
        doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...COL.muted);
        let txt = '';
        if (r.totalFerieAuto > 0) txt += `Fériés non travaillés (auto +${formatHours(r.totalFerieAuto)})`;
        if (r.totalFerieWorked > 0) {
          if (txt) txt += '  ·  ';
          txt += `Fériés travaillés (+100% : ${formatHours(r.totalFerieWorked)})`;
        }
        doc.text(txt, margin + 4, cursorY + 9);
        cursorY += 18;
      }

      // --- Detail table: one row per entry, grouped by day
      const tableRows = [];
      r.entries.forEach(e => {
        const dateStr = e.date.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
        const dayShort = e.dayName.substring(0, 3) + '.';
        const ferie = e.meta.ferie;

        if (e.entries.length === 0) {
          // Empty day
          if (ferie && e.meta.isWorkingDay) {
            tableRows.push([
              dayShort, dateStr,
              '★ ' + ferie + ' · non travaillé',
              '', '', '',
              formatHours(e.meta.ferieAutoMin) + ' (auto)'
            ]);
          } else {
            tableRows.push([dayShort, dateStr, ferie ? '★ ' + ferie : '—', '', '', '', '—']);
          }
        } else {
          e.entries.forEach((entry, idx) => {
            const activity = entry.activity || 'au_travail';
            const cfg = ACTIVITIES[activity] || ACTIVITIES.au_travail;
            let label = cfg.label;
            if (idx === 0 && ferie) label = '★ ' + ferie + ' · ' + label;
            tableRows.push([
              idx === 0 ? dayShort : '',
              idx === 0 ? dateStr : '',
              label,
              entry.arrival || '',
              entry.departure || '',
              entry.pause ? entry.pause + ' min' : '',
              cfg.isWork ? formatHours(calcEntryMinutes(entry)) : '—'
            ]);
          });
        }
      });

      doc.autoTable({
        startY: cursorY,
        head: [['Jour', 'Date', 'Activité', 'Arrivée', 'Départ', 'Pause', 'Total']],
        body: tableRows,
        margin: { left: margin, right: margin },
        theme: 'plain',
        styles: {
          font: 'helvetica', fontSize: 9,
          cellPadding: { top: 3, bottom: 3, left: 3, right: 3 },
          textColor: COL.ink, lineColor: COL.border, lineWidth: 0.1
        },
        headStyles: {
          fillColor: [244, 236, 220], textColor: COL.muted,
          fontStyle: 'bold', fontSize: 7.5,
          cellPadding: { top: 4, bottom: 4, left: 3, right: 3 }
        },
        bodyStyles: { lineColor: COL.border, lineWidth: { bottom: 0.15 } },
        columnStyles: {
          0: { cellWidth: 16, fontStyle: 'bold' },
          1: { cellWidth: 18, font: 'courier' },
          2: { cellWidth: 'auto' },
          3: { cellWidth: 18, font: 'courier', halign: 'center' },
          4: { cellWidth: 18, font: 'courier', halign: 'center' },
          5: { cellWidth: 18, font: 'courier', halign: 'center' },
          6: { cellWidth: 24, font: 'courier', fontStyle: 'bold', halign: 'right' }
        },
        didParseCell: (data) => {
          if (data.section === 'body') {
            const txt = String(data.row.raw[2] || '');
            if (txt.includes('À récupérer')) {
              data.cell.styles.fillColor = [254, 242, 226];
              data.cell.styles.textColor = [138, 79, 31];
              data.cell.styles.fontStyle = 'italic';
            } else if (txt.startsWith('★')) {
              data.cell.styles.fillColor = [251, 232, 232];
              data.cell.styles.textColor = [122, 60, 50];
            }
          }
        }
      });
      cursorY = doc.lastAutoTable.finalY + 8;

      // Salary block intentionally removed from PDF export.
      // The salary estimate remains visible in the app only.

      // Absences summary
      const totalAbs = Object.values(r.absences).reduce((a, b) => a + b, 0);
      if (totalAbs > 0) {
        if (cursorY > 250) { doc.addPage(); cursorY = margin; }
        doc.setFont('times', 'italic'); doc.setFontSize(11); doc.setTextColor(...COL.ink);
        doc.text('Absences sur la période', margin, cursorY + 4);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(...COL.muted);
        let line = '';
        if (r.absences.conges) line += `Congés : ${r.absences.conges} j   ·   `;
        if (r.absences.maladie) line += `Maladie : ${r.absences.maladie} j   ·   `;
        if (r.absences.arret) line += `Arrêt : ${r.absences.arret} j   ·   `;
        if (r.absences.recuperation) line += `Récup : ${r.absences.recuperation} j   ·   `;
        line = line.replace(/   ·   $/, '');
        doc.text(line, margin, cursorY + 10);
        cursorY += 16;
      }

      // Footer
      const totalPages = doc.internal.getNumberOfPages();
      for (let p = 1; p <= totalPages; p++) {
        doc.setPage(p);
        const pageH = doc.internal.pageSize.getHeight();
        doc.setDrawColor(...COL.border); doc.setLineWidth(0.2);
        doc.line(margin, pageH - 14, pageW - margin, pageH - 14);
        doc.setFont('times', 'italic'); doc.setFontSize(8); doc.setTextColor(...COL.muted);
        const gen = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        doc.text('Généré le ' + gen, margin, pageH - 8);
        const pt = 'Page ' + p + ' / ' + totalPages;
        const ptW = doc.getTextWidth(pt);
        doc.text(pt, pageW - margin - ptW, pageH - 8);
      }

      doc.save('feuille-temps-' + isoDate(startDate) + '-au-' + isoDate(endDate) + '.pdf');
      closeExport();
    }
