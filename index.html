    function fmtDate(d) { return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }); }
    function fmtDateLong(d) { return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }); }

    // Custom time input using two selects (avoids iOS time picker auto-close bug)
    function renderTimeSelect(currentValue, dayKey, idx, field) {
      const parts = (currentValue || '').split(':');
      const curH = parts[0] || '';
      const curM = parts[1] || '';
      let hourOpts = '<option value=""' + (curH === '' ? ' selected' : '') + '>--</option>';
      for (let h = 0; h < 24; h++) {
        const v = String(h).padStart(2, '0');
        hourOpts += `<option value="${v}"${v === curH ? ' selected' : ''}>${v}</option>`;
      }
      let minOpts = '<option value=""' + (curM === '' ? ' selected' : '') + '>--</option>';
      const QUARTERS = ['00', '15', '30', '45'];
      // Include the current value even if not a quarter (preserves legacy data)
      if (curM && !QUARTERS.includes(curM)) {
        minOpts += `<option value="${curM}" selected>${curM}</option>`;
      }
      QUARTERS.forEach(v => {
        minOpts += `<option value="${v}"${v === curM ? ' selected' : ''}>${v}</option>`;
      });
      return `
        <div class="time-pick" data-day="${dayKey}" data-idx="${idx}" data-field="${field}">
          <select class="input time-select" onchange="onTimeSelectChange(this)">${hourOpts}</select>
          <span class="time-sep">:</span>
          <select class="input time-select" onchange="onTimeSelectChange(this)">${minOpts}</select>
        </div>
      `;
    }
    function onTimeSelectChange(selectElem) {
      const wrapper = selectElem.closest('.time-pick');
      if (!wrapper) return;
      const selects = wrapper.querySelectorAll('select');
      if (selects.length !== 2) return;
      let h = selects[0].value;
      let m = selects[1].value;
      // If user picked only hour or only minute, auto-fill the other with "00"
      // so the time is immediately valid and counted.
      if (h !== '' && m === '') { m = '00'; selects[1].value = '00'; }
      if (h === '' && m !== '') { h = '00'; selects[0].value = '00'; }
      const value = (h !== '' && m !== '') ? (h + ':' + m) : '';
      const dayKey = wrapper.dataset.day;
      const idx = parseInt(wrapper.dataset.idx);
      const field = wrapper.dataset.field;
      ensureDayArray(dayKey);
      if (!state.weekData[dayKey][idx]) state.weekData[dayKey][idx] = {};
      state.weekData[dayKey][idx][field] = value;
      saveWeek();
      // The select picker is already closed after user taps OK, so a full render is safe
      // and ensures the summary box (Travaillé, HS25, HS50, salaire) is updated.
      render();
    }
    function isToday(date) { return date.toDateString() === new Date().toDateString(); }

    function renderEntry(dayKey, idx, entry) {
      const activity = entry.activity || 'au_travail';
      const cfg = ACTIVITIES[activity] || ACTIVITIES.au_travail;
      const isWork = cfg.isWork;
      const minutes = calcEntryMinutes(entry);

      const pillsHtml = Object.entries(ACTIVITIES).map(([key, c]) => {
        const isActive = activity === key;
        const styleAttr = isActive ? `style="--pill-bg:${c.bg}; --pill-color:${c.color}"` : '';
        return `<button class="pill ${isActive ? 'pill-active' : ''}" ${styleAttr} onclick="setEntryActivity('${dayKey}', ${idx}, '${key}')">${c.short}</button>`;
      }).join('');

      let bodyHtml = '';
      if (isWork) {
        bodyHtml = `
          <div class="input-grid">
            <div>
              <label class="input-label">Arrivée</label>
              ${renderTimeSelect(entry.arrival, dayKey, idx, 'arrival')}
            </div>
            <div>
              <label class="input-label">Départ</label>
              ${renderTimeSelect(entry.departure, dayKey, idx, 'departure')}
            </div>
            <div>
              <label class="input-label">Pause (min)</label>
              <input type="number" class="input" inputmode="numeric" value="${entry.pause || ''}" placeholder="0" onchange="updateEntry('${dayKey}', ${idx}, 'pause', this.value)">
            </div>
          </div>
        `;
      } else {
        bodyHtml = `<div class="activity-badge" style="background:${cfg.bg}; color:${cfg.color}">${escapeHtml(cfg.label)} · journée complète</div>`;
      }

      return `
        <div class="entry-block">
          <div class="entry-header">
            <span class="entry-label">Saisie ${idx + 1}${isWork && minutes > 0 ? ' · ' : ''}${isWork && minutes > 0 ? `<span class="entry-minutes">${formatHours(minutes)}</span>` : ''}</span>
            <button class="btn btn-ghost" style="padding:0.25rem" onclick="removeEntry('${dayKey}', ${idx})" aria-label="Supprimer cette saisie">${ICONS.trash}</button>
          </div>
          <div class="pills-row" style="margin-bottom:0.625rem">${pillsHtml}</div>
          ${bodyHtml}
        </div>
      `;
    }

    function renderDayCard(d, i) {
      const monday = getMondayOfWeek(state.currentDate);
      const date = new Date(monday); date.setDate(monday.getDate() + i);
      const day = state.weekData[d.key];
      const entries = getDayEntries(day);
      const meta = getDayMeta(day, date, i, state.settings);
      const minutes = meta.workedMin;
      const isWeekend = i === 5 || i === 6;
      const today = isToday(date);
      const ferie = meta.ferie;

      let cardClass = 'card';
      if (today) cardClass = 'card card-today';
      else if (ferie) cardClass = 'card card-ferie';
      else if (isWeekend) cardClass = 'card card-weekend';

      // Compute display total: worked + ferie auto
      const displayTotal = minutes + meta.ferieAutoMin;
      const totalClass = displayTotal > 0 ? 'day-total' : 'day-total day-total-empty';

      const ferieBadge = ferie ? `<span class="ferie-badge">★ ${escapeHtml(ferie)}</span>` : '';
      const nameClass = (isWeekend && !today && !ferie) ? 'day-name day-name-muted' : 'day-name';

      const entriesHtml = entries.length > 0
        ? entries.map((e, idx) => renderEntry(d.key, idx, e)).join('')
        : '';

      // Auto-blocs (férié non travaillé / à récupérer)
      let autoHtml = '';
      if (meta.ferieAutoMin > 0) {
        autoHtml += `
          <div class="auto-entry auto-entry-ferie">
            <span>★ Férié non travaillé · ${escapeHtml(ferie)}</span>
            <span class="auto-entry-value">+${formatHours(meta.ferieAutoMin)}</span>
          </div>
        `;
      }

      const addBtnHtml = `<button class="add-entry-btn" onclick="addEntry('${d.key}')">${ICONS.plus} Ajouter une saisie</button>`;

      return `
        <div class="${cardClass}">
          <div class="day-header">
            <div>
              <h3 class="${nameClass}">${d.label}</h3><span class="day-date">${fmtDate(date)}</span>
              ${ferieBadge ? ' ' + ferieBadge : ''}
            </div>
            <span id="day-total-${d.key}" class="${totalClass}">${formatHours(displayTotal)}</span>
          </div>
          ${entriesHtml}
          ${addBtnHtml}
          ${autoHtml}
        </div>
      `;
    }

    function renderExportModal() {
      if (!state.showExport) return '';
      const startD = parseIsoDate(state.exportStart);
      const endD = parseIsoDate(state.exportEnd);
      const previewText = (startD && endD && startD <= endD)
        ? `<strong>${fmtDateLong(startD)}</strong> → <strong>${fmtDateLong(endD)}</strong>`
        : '<em>Dates invalides</em>';
      const disabled = !(startD && endD && startD <= endD);
      return `
        <div class="modal-backdrop" onclick="if(event.target===this) closeExport()">
          <div class="modal">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.25rem">
              <h2>Exporter en PDF</h2>
              <button class="btn btn-ghost" onclick="closeExport()" aria-label="Fermer">${ICONS.x}</button>
            </div>
            <p class="modal-subtitle">Choisis la période à exporter</p>
            <div class="period-options">
              <button class="period-option ${state.exportType === 'week' ? 'period-option-active' : ''}" onclick="setExportType('week')">Semaine<small>en cours</small></button>
              <button class="period-option ${state.exportType === 'month' ? 'period-option-active' : ''}" onclick="setExportType('month')">Mois<small>en cours</small></button>
              <button class="period-option ${state.exportType === 'custom' ? 'period-option-active' : ''}" onclick="setExportType('custom')">Du... au<small>au choix</small></button>
            </div>
            <div class="panel-grid-2" style="margin-bottom:1rem">
              <div>
                <label class="panel-label">Du</label>
                <input type="date" class="input" value="${state.exportStart}" onchange="setExportDate('exportStart', this.value); state.exportType='custom'">
              </div>
              <div>
                <label class="panel-label">Au</label>
                <input type="date" class="input" value="${state.exportEnd}" onchange="setExportDate('exportEnd', this.value); state.exportType='custom'">
              </div>
            </div>
            <div class="preview-info">${previewText}</div>
            <div class="modal-actions">
              <button class="btn btn-secondary" onclick="closeExport()">Annuler</button>
              <button class="btn btn-primary" onclick="generatePDF()" ${disabled ? 'disabled' : ''}>${ICONS.pdf} Générer le PDF</button>
            </div>
          </div>
        </div>
      `;
    }

    // Render the "HS payées par l'employeur" section in settings
    function renderPaidHSSection() {
      const { monthResults } = resolveAllMonths();
      const monthKeys = Array.from(monthResults.keys()).sort();
      if (monthKeys.length === 0) {
        return `
          <div style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid rgba(224,212,190,0.6)">
            <h3 style="margin:0 0 0.5rem">HS payées par l'employeur</h3>
            <p style="font-size:0.75rem; color:#7A6F5C; margin:0; line-height:1.4">
              Aucun mois avec des heures supplémentaires pour le moment.
            </p>
          </div>
        `;
      }

      const monthRows = monthKeys.map(mk => {
        const m = monthResults.get(mk);
        const paid = getPaidHSForMonth(mk);
        const netHS25 = m.netHS25Min || 0;
        const netHS50 = m.netHS50Min || 0;
        const dueHS25 = m.carryOutHS25Min || 0;
        const dueHS50 = m.carryOutHS50Min || 0;

        // Only show months with HS to pay or already paid
        if (netHS25 === 0 && netHS50 === 0 && paid.hs25Min === 0 && paid.hs50Min === 0) return '';

        const fmt = (min) => {
          if (!min || min === 0) return '';
          const h = Math.floor(min / 60);
          const mm = min % 60;
          return mm === 0 ? String(h) : (h + 'h' + String(mm).padStart(2, '0'));
        };
        const dateObj = parseIsoDate(mk + '-01');
        const monthLabel = dateObj ? dateObj.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }) : mk;
        const hs25Display = netHS25 > 0 ? formatHours(netHS25) : '0h 00';
        const hs50Display = netHS50 > 0 ? formatHours(netHS50) : '0h 00';
        const totalDue = dueHS25 + dueHS50;

        return `
          <div style="margin-top:0.875rem; padding:0.75rem; background:rgba(255,255,255,0.5); border:1px solid rgba(224,212,190,0.6); border-radius:10px">
            <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:0.5rem; flex-wrap:wrap; gap:0.25rem">
              <span style="font-family:'Fraunces',serif; font-weight:600; font-size:0.9375rem; text-transform:capitalize">${escapeHtml(monthLabel)}</span>
              ${totalDue > 0 ? `<span style="font-size:0.6875rem; color:#8A6320; font-weight:500">Dues : ${formatHours(totalDue)}</span>` : '<span style="font-size:0.6875rem; color:#5B7B5B; font-weight:500">✓ tout payé</span>'}
            </div>
            <p style="font-size:0.6875rem; color:#7A6F5C; margin:0 0 0.5rem">À payer : ${hs25Display} HS 25% · ${hs50Display} HS 50%</p>
            <div class="panel-grid-2" style="gap:0.5rem">
              <div>
                <label class="panel-label" style="font-size:0.625rem">HS 25% payées</label>
                <input type="text" class="input" inputmode="decimal" value="${fmt(paid.hs25Min)}" placeholder="ex: 5 ou 5h30" onchange="updatePaidHSField('${mk}', 'hs25Min', this.value)" style="font-size:0.875rem; padding:0.4375rem 0.625rem; min-height:36px">
              </div>
              <div>
                <label class="panel-label" style="font-size:0.625rem">HS 50% payées</label>
                <input type="text" class="input" inputmode="decimal" value="${fmt(paid.hs50Min)}" placeholder="ex: 0 ou 2h" onchange="updatePaidHSField('${mk}', 'hs50Min', this.value)" style="font-size:0.875rem; padding:0.4375rem 0.625rem; min-height:36px">
              </div>
            </div>
          </div>
        `;
      }).filter(Boolean).join('');

      if (!monthRows) {
        return `
          <div style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid rgba(224,212,190,0.6)">
            <h3 style="margin:0 0 0.5rem">HS payées par l'employeur</h3>
            <p style="font-size:0.75rem; color:#7A6F5C; margin:0; line-height:1.4">
              Aucun mois avec des heures supplémentaires à payer pour le moment.
            </p>
          </div>
        `;
      }

      return `
        <div style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid rgba(224,212,190,0.6)">
          <h3 style="margin:0 0 0.5rem">HS payées par l'employeur</h3>
          <p style="font-size:0.75rem; color:#7A6F5C; margin:0 0 0.5rem; line-height:1.4">
            Saisis pour chaque mois ce qui t'a effectivement été payé sur ta fiche de paie.
            Les heures non payées sont reportées sur le mois suivant comme HS supplémentaires.
          </p>
          ${monthRows}
        </div>
      `;
    }

    function render() {
      const calc = getCurrentCalc();
      const monday = getMondayOfWeek(state.currentDate);
      const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
      const weekNum = getWeekNumber(monday);
      const seuil = parseFloat(state.settings.contractuel) || 35;

      const backupStatus = getBackupStatus();
      const backupStatusText = backupStatus.never
        ? 'Jamais sauvegardé'
        : backupStatus.daysSince === 0
          ? 'Aujourd\'hui'
          : backupStatus.daysSince === 1
            ? 'Hier'
            : 'Il y a ' + backupStatus.daysSince + ' jours';
      const backupStatusColor = backupStatus.never || backupStatus.daysSince > 14
        ? '#C56B5A'
        : backupStatus.daysSince > 7
          ? '#E8A547'
          : '#5B7B5B';

      const settingsHtml = state.showSettings ? `
        <div class="card panel">
          <h3>Réglages</h3>
          <div class="panel-grid-2">
            <div>
              <label class="panel-label">Heures contractuelles / sem.</label>
              <input type="number" class="input" inputmode="decimal" value="${state.settings.contractuel}" onchange="updateSetting('contractuel', this.value)">
            </div>
            <div>
              <label class="panel-label">Taux horaire brut (€/h)</label>
              <input type="number" step="0.01" class="input" inputmode="decimal" value="${state.settings.taux}" placeholder="ex : 12.50" onchange="updateSetting('taux', this.value)">
            </div>
          </div>
          <div style="margin-top:0.75rem">
            <label class="panel-label">Date de début de contrat</label>
            <input type="date" class="input" value="${state.settings.contractStart || ''}" onchange="updateSetting('contractStart', this.value)">
            <p style="font-size:0.6875rem; color:#A89F90; margin:0.375rem 0 0; font-style:italic">Les semaines antérieures à cette date ne génèrent ni HS ni récup.</p>
          </div>
          <div style="margin-top:0.75rem">
            <label class="panel-label">Cotisations sociales (% du brut)</label>
            <input type="number" step="0.1" min="0" max="50" class="input" inputmode="decimal" value="${state.settings.cotisations}" placeholder="23" onchange="updateSetting('cotisations', this.value)">
            <p style="font-size:0.6875rem; color:#A89F90; margin:0.375rem 0 0; font-style:italic">Sert au calcul du net estimé. ~22-23% pour un non-cadre.</p>
          </div>

          ${renderPaidHSSection()}

          <div style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid rgba(224,212,190,0.6)">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.625rem; flex-wrap:wrap; gap:0.5rem">
              <h3 style="margin:0">Sauvegarde iCloud</h3>
              <span style="font-size:0.75rem; color:${backupStatusColor}; font-weight:500">${backupStatusText}</span>
            </div>
            <p style="font-size:0.75rem; color:#7A6F5C; margin:0 0 0.875rem; line-height:1.4">
              Sauve un fichier JSON de toutes tes données. Choisis "Enregistrer dans Fichiers" → iCloud Drive pour le retrouver sur tous tes appareils.
            </p>
            <div class="panel-grid-2">
              <button class="btn btn-primary" onclick="backupToFiles()">${ICONS.download} Sauvegarder</button>
              <button class="btn btn-secondary" onclick="triggerRestore()">${ICONS.upload || ICONS.download} Restaurer</button>
            </div>
          </div>
        </div>
      ` : '';

      // Backup reminder banner (when last backup > 14 days or never)
      const showBackupReminder = (backupStatus.never || backupStatus.daysSince > 14) && !state.showSettings;
      const backupReminder = showBackupReminder ? `
        <div class="card" style="margin-bottom:1rem; padding:0.875rem 1rem; background:rgba(232,165,71,0.12); border-color:rgba(232,165,71,0.35); display:flex; align-items:center; gap:0.75rem">
          <div style="flex:1">
            <p style="font-family:'Fraunces',serif; font-style:italic; font-size:0.9375rem; margin:0; color:#8A6320">
              ${backupStatus.never ? 'Pense à sauvegarder tes données.' : 'Dernière sauvegarde il y a ' + backupStatus.daysSince + ' jours.'}
            </p>
            <p style="font-size:0.75rem; color:#7A6F5C; margin:0.125rem 0 0">Une simple manip vers iCloud Drive et c'est en sécurité.</p>
          </div>
          <button class="btn btn-primary" style="padding:0.5rem 0.875rem; font-size:0.8125rem" onclick="backupToFiles()">Sauvegarder</button>
        </div>
      ` : '';

      const templatesHtml = state.showTemplates ? `
        <div class="card panel">
          <p style="font-size:0.8125rem; color:#7A6F5C; margin:0 0 0.75rem">
            Pré-remplit Lundi à Vendredi en "Au travail" sans pause. Remplace le contenu actuel.
          </p>
          <div class="templates-buttons">
            <button class="btn btn-primary" onclick="loadTemplate('conditionnement')">
              <span class="template-btn-content"><span>Conditionnement</span><small>9h–16h</small></span>
            </button>
            <button class="btn btn-primary" onclick="loadTemplate('brassage')">
              <span class="template-btn-content"><span>Brassage</span><small>8h–15h</small></span>
            </button>
          </div>
        </div>
      ` : '';

      // Récup ledger — always visible as a permanent journal
      const remainingMin = calc.ledgerRemainingMin || 0;
      const isClearedRecup = remainingMin === 0;
      const hs25ConsumedMin = calc.ledgerHS25ConsumedMin || 0;
      const hs50ConsumedMin = calc.ledgerHS50ConsumedMin || 0;
      const breakdownParts = [];
      if (hs25ConsumedMin > 0) breakdownParts.push(formatHours(hs25ConsumedMin) + ' HS 25%');
      if (hs50ConsumedMin > 0) breakdownParts.push(formatHours(hs50ConsumedMin) + ' HS 50%');
      const recoveredBreakdown = breakdownParts.length > 0
        ? `<p class="summary-subnote" style="color:#A8C9A8">dont ${breakdownParts.join(' + ')}</p>`
        : '';
      const recupBlock = `
        <div class="summary-section">
          <p class="summary-label" style="text-align:center; margin-bottom:0.5rem">Récupération · journal cumulé</p>
          <div class="summary-cols-3">
            <div>
              <p class="summary-sublabel">Créées</p>
              <p class="summary-subvalue">${formatHours(calc.ledgerCreatedMin || 0)}</p>
            </div>
            <div>
              <p class="summary-sublabel">Récupérées</p>
              <p class="summary-subvalue" style="color:#7FB87F">${formatHours(calc.ledgerRecoveredMin || 0)}</p>
              ${recoveredBreakdown}
            </div>
            <div>
              <p class="summary-sublabel">Solde restant</p>
              <p class="summary-subvalue" style="color:${isClearedRecup ? '#7FB87F' : '#E8A547'}">${isClearedRecup ? '0h 00 ✓' : formatHours(remainingMin)}</p>
            </div>
          </div>
        </div>
      `;

      const deficitBlock = '';

      // Heures dues block: HS not yet paid carried from previous month or this month
      let duesBlock = '';
      if (calc.monthInfo) {
        const mi = calc.monthInfo;
        const carryIn25 = mi.carryInHS25Min || 0;
        const carryIn50 = mi.carryInHS50Min || 0;
        const dueOut25 = mi.carryOutHS25Min || 0;
        const dueOut50 = mi.carryOutHS50Min || 0;
        const paid25 = mi.paidHS25Min || 0;
        const paid50 = mi.paidHS50Min || 0;
        const totalDueOut = dueOut25 + dueOut50;
        const totalCarryIn = carryIn25 + carryIn50;
        const totalPaid = paid25 + paid50;
        // Show the block if anything is happening: HS to carry forward, paid HS recorded, or carryover from previous
        if (totalDueOut > 0 || totalPaid > 0 || totalCarryIn > 0) {
          const monthLabel = state.currentDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
          const dueParts = [];
          if (dueOut25 > 0) dueParts.push(formatHours(dueOut25) + ' HS 25%');
          if (dueOut50 > 0) dueParts.push(formatHours(dueOut50) + ' HS 50%');
          const carryParts = [];
          if (carryIn25 > 0) carryParts.push(formatHours(carryIn25) + ' HS 25%');
          if (carryIn50 > 0) carryParts.push(formatHours(carryIn50) + ' HS 50%');
          const paidParts = [];
          if (paid25 > 0) paidParts.push(formatHours(paid25) + ' HS 25%');
          if (paid50 > 0) paidParts.push(formatHours(paid50) + ' HS 50%');

          duesBlock = `
            <div class="summary-section">
              <p class="summary-label" style="text-align:center; margin-bottom:0.5rem">Heures supplémentaires · ${escapeHtml(monthLabel)}</p>
              <div class="summary-cols-3">
                <div>
                  <p class="summary-sublabel">Reportées</p>
                  <p class="summary-subvalue">${formatHours(totalCarryIn)}</p>
                  ${carryParts.length ? `<p class="summary-subnote">${carryParts.join(' + ')}</p>` : ''}
                </div>
                <div>
                  <p class="summary-sublabel">Payées</p>
                  <p class="summary-subvalue" style="color:#7FB87F">${formatHours(totalPaid)}</p>
                  ${paidParts.length ? `<p class="summary-subnote" style="color:#A8C9A8">${paidParts.join(' + ')}</p>` : ''}
                </div>
                <div>
                  <p class="summary-sublabel">Dues</p>
                  <p class="summary-subvalue" style="color:${totalDueOut > 0 ? '#E8A547' : '#7FB87F'}">${totalDueOut > 0 ? formatHours(totalDueOut) : '0h 00 ✓'}</p>
                  ${dueParts.length ? `<p class="summary-subnote" style="color:#E8C99C">${dueParts.join(' + ')}</p>` : ''}
                </div>
              </div>
              <p style="text-align:center; font-size:0.625rem; color:#A89F90; margin:0.5rem 0 0; font-style:italic">À configurer dans Réglages → "HS payées par l'employeur"</p>
            </div>
          `;
        }
      }

      const ferieBlock = (calc.ferieWorkedH > 0 || calc.ferieAutoH > 0) ? `
        <div class="summary-section" style="text-align:center">
          ${calc.ferieAutoH > 0 ? `<p class="summary-label">Férié non travaillé · auto</p>
          <p class="summary-value">+${formatHours(calc.ferieAutoMin)}</p>` : ''}
          ${calc.ferieWorkedH > 0 ? `<p class="summary-label" style="margin-top:${calc.ferieAutoH > 0 ? '0.625rem' : '0'}">Férié travaillé · +100%</p>
          <p class="summary-value summary-value-highlight">${formatHours(calc.ferieWorkedMin)}</p>` : ''}
        </div>
      ` : '';

      // Monthly salary calculation (1st to last day of the month containing currentDate)
      const monthStart = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth(), 1);
      const monthEnd = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + 1, 0);
      let monthSalary = null;
      if (calc.taux > 0) {
        const monthCalc = calcRange(monthStart, monthEnd);
        const cotisationsPct = parseFloat(state.settings.cotisations);
        const cotisationsRate = isNaN(cotisationsPct) ? 0.23 : cotisationsPct / 100;
        const netEstimate = monthCalc.salaireTotal * (1 - cotisationsRate);
        monthSalary = {
          brut: monthCalc.salaireTotal,
          majoration: monthCalc.majoration,
          net: netEstimate,
          monthLabel: monthStart.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })
        };
      }

      const salaireBlock = monthSalary ? `
        <div class="summary-section">
          <p class="summary-label" style="text-align:center; margin-bottom:0.5rem">Salaire ${escapeHtml(monthSalary.monthLabel)}</p>
          <div class="summary-cols-2">
            <div>
              <p class="summary-sublabel">Brut estimé</p>
              <p class="summary-subvalue">${monthSalary.brut.toFixed(2)} €</p>
              <p class="summary-subnote">net ~ ${monthSalary.net.toFixed(2)} €</p>
            </div>
            <div>
              <p class="summary-sublabel">dont majoration</p>
              <p class="summary-subvalue ${monthSalary.majoration > 0 ? 'summary-value-highlight' : ''}">+${monthSalary.majoration.toFixed(2)} €</p>
            </div>
          </div>
        </div>
      ` : '';

      const daysHtml = DAYS.map((d, i) => renderDayCard(d, i)).join('');

      document.getElementById('app').innerHTML = `
        <header>
          <div class="header-row">
            <div>
              <h1>Feuille de temps</h1>
              <p class="subtitle">droit français · seuil ${seuil}h · +25% / +50% / fériés +100%</p>
            </div>
            <button class="btn btn-ghost" onclick="toggleSettings()" aria-label="Réglages">${ICONS.settings}</button>
          </div>
        </header>

        ${settingsHtml}
        ${backupReminder}

        <div class="week-nav">
          <button class="btn btn-ghost" onclick="goToPrevWeek()" aria-label="Semaine précédente">${ICONS.chevronLeft}</button>
          <div style="text-align:center; cursor:pointer" onclick="goToToday()">
            <p class="week-label-week">Semaine ${weekNum}</p>
            <p class="week-label-dates">${fmtDate(monday)} — ${fmtDate(sunday)}</p>
          </div>
          <button class="btn btn-ghost" onclick="goToNextWeek()" aria-label="Semaine suivante">${ICONS.chevronRight}</button>
        </div>

        <div class="summary">
          <div class="summary-grid">
            <div><p class="summary-label">Travaillé</p><p class="summary-value">${formatHours(calc.workedMin)}</p></div>
            <div><p class="summary-label">Normales</p><p class="summary-value">${formatHours((calc.heuresNormales + calc.ferieAutoH) * 60)}</p></div>
            <div>
              <p class="summary-label">HS 25%</p>
              <p class="summary-value ${calc.hs25Raw > 0 ? 'summary-value-highlight' : ''}">${formatHours(calc.hs25Raw * 60)}</p>
              ${(calc.hs25Raw - calc.netHS25) > 0.0001 ? `<p class="summary-subnote">dont ${formatHours((calc.hs25Raw - calc.netHS25) * 60)} récupérées</p>` : ''}
            </div>
            <div>
              <p class="summary-label">HS 50%</p>
              <p class="summary-value ${calc.hs50Raw > 0 ? 'summary-value-highlight' : ''}">${formatHours(calc.hs50Raw * 60)}</p>
              ${(calc.hs50Raw - calc.netHS50) > 0.0001 ? `<p class="summary-subnote">dont ${formatHours((calc.hs50Raw - calc.netHS50) * 60)} récupérées</p>` : ''}
            </div>
          </div>
          ${recupBlock}
          ${duesBlock}
          ${deficitBlock}
          ${ferieBlock}
          ${salaireBlock}
        </div>

        <div style="margin-bottom:1rem; display:flex; justify-content:center">
          <button class="btn btn-secondary" onclick="toggleTemplates()">${ICONS.sparkles} Charger une semaine type</button>
        </div>

        ${templatesHtml}

        <div class="days-list">${daysHtml}</div>

        <div class="actions-row">
          <button class="btn btn-primary" onclick="openExport()">${ICONS.pdf} Exporter en PDF</button>
